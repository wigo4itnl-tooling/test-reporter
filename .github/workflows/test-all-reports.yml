name: Run all reports

on:
  pull_request:
    branches:
      - main
    paths-ignore: ['**.md']
  push:
    paths-ignore: ['**.md']
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reports:
    name: Run
    runs-on: ubuntu-latest

    strategy:
      matrix:
        reporter:
          [
            jest-junit,
            mocha-json,
            swift-xunit,
            dart-json,
            dotnet-trx,
            java-junit,
            flutter-json,
            dotnet-nunit,
            golang-json,
            tester-junit,
            phpunit-junit,
            python-xunit,
            rspec-json
          ]
        include:
          - reporter: jest-junit
            path: ./__tests__/fixtures/jest-junit.xml
          - reporter: mocha-json
            path: ./__tests__/fixtures/mocha-json.json
          - reporter: swift-xunit
            path: ./__tests__/fixtures/swift-xunit.xml
          - reporter: dart-json
            path: ./__tests__/fixtures/dart-json.json
          - reporter: dotnet-trx
            path: ./__tests__/fixtures/dotnet-trx.trx
          - reporter: java-junit
            path: ./__tests__/fixtures/external/java/pulsar-test-report.xml
          - reporter: flutter-json
            path: ./__tests__/fixtures/external/flutter/provider-test-results.json
          - reporter: dotnet-nunit
            path: ./__tests__/fixtures/dotnet-nunit.xml
          - reporter: golang-json
            path: ./__tests__/fixtures/golang-json.json
          - reporter: tester-junit
            path: ./__tests__/fixtures/nette-tester/tester-v1.7-report.xml
          - reporter: phpunit-junit
            path: ./__tests__/fixtures/phpunit/phpunit.xml
          - reporter: python-xunit
            path: ./__tests__/fixtures/python-xunit-pytest.xml
          - reporter: rspec-json
            path: ./__tests__/fixtures/rspec-json.json

    steps:
    - uses: actions/checkout@v7

    - uses: ./
      id: report
      with:
        name: ${{ matrix.reporter }} report
        path: ${{ matrix.path }}
        reporter: ${{ matrix.reporter }}
        fail-on-error: false

    - name: Generate a second report for anchor validation
      if: ${{ matrix.reporter == 'jest-junit' }}
      id: second_report
      uses: ./
      with:
        name: jest-junit alternate report
        path: ${{ matrix.path }}
        reporter: ${{ matrix.reporter }}
        fail-on-error: false

    - name: Verify report names produce unique anchors
      if: ${{ matrix.reporter == 'jest-junit' }}
      env:
        FIRST_REPORT_NAME: ${{ matrix.reporter }} report
        FIRST_SLUG_PREFIX: ${{ steps.report.outputs.slug_prefix }}
        FIRST_SUMMARY_FILE: ${{ steps.report.outputs.summary_file }}
        SECOND_REPORT_NAME: jest-junit alternate report
        SECOND_SLUG_PREFIX: ${{ steps.second_report.outputs.slug_prefix }}
        SECOND_SUMMARY_FILE: ${{ steps.second_report.outputs.summary_file }}
      run: |
        node --input-type=module <<'NODE'
        import {readFileSync} from 'node:fs'

        function anchorId(prefix, reportName, anchor) {
          const slug = `${prefix}${reportName}-${anchor}`
            .trim()
            .replace(/_/g, '')
            .replace(/[./\\]/g, '-')
            .replace(/[^\w-]/g, '')
            .toLowerCase()
          return `user-content-${slug}`
        }

        const reports = [
          {
            name: process.env.FIRST_REPORT_NAME,
            prefix: process.env.FIRST_SLUG_PREFIX,
            summaryFile: process.env.FIRST_SUMMARY_FILE
          },
          {
            name: process.env.SECOND_REPORT_NAME,
            prefix: process.env.SECOND_SLUG_PREFIX,
            summaryFile: process.env.SECOND_SUMMARY_FILE
          }
        ]

        const reportAnchorIds = reports.map(report => anchorId(report.prefix, report.name, 'test-report'))
        if (new Set(reportAnchorIds).size !== reports.length) {
          throw new Error(`Report anchors are not unique: ${reportAnchorIds.join(', ')}`)
        }

        for (const [index, report] of reports.entries()) {
          const summary = readFileSync(report.summaryFile, 'utf8')
          const reportAnchorId = reportAnchorIds[index]
          const runAnchorId = anchorId(report.prefix, report.name, 'r0')
          const suiteAnchorId = anchorId(report.prefix, report.name, 'r0s0')
          const expectedContent = [
            `](#${reportAnchorId})`,
            `<a name="${reportAnchorId}"></a>`,
            `href="#${runAnchorId}"`,
            `href="#${suiteAnchorId}"`
          ]

          for (const expected of expectedContent) {
            if (!summary.includes(expected)) {
              throw new Error(`Summary ${report.summaryFile} does not contain ${expected}`)
            }
          }
        }
        NODE
